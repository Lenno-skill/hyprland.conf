################
### MONITORS ###
################

monitor = eDP-1, 1920x1080@60, 0x0, 1
# monitor = DP-1, 1920x1080@60, 1920x0, 1
monitor = HDMI-A-1, preferred, auto, 1
monitor = DP-2, 1920x1080@60Hz, -1920x0, 1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = nemo
$browser = ~/.config/hypr/scripts/brave-launch.sh
$menu = fuzzel
$mainMod = SUPER

#################
### AUTOSTART ###
#################

exec-once = bash -c "wl-paste --watch cliphist store &"
exec-once = bash -c 'gsettings set org.gnome.desktop.interface icon-theme Papirus-Dark; gsettings set org.cinnamon.desktop.interface icon-theme Papirus-Dark'
exec-once = qs -c noctalia-shell -d
exec-once = nm-applet &

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,18
env = HYPRCURSOR_SIZE,18
env = XCURSOR_THEME,Bibata-Modern-Classic

env = QT_QPA_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORMTHEME_QT6,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 0
    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.08
    bezier = stall, 1, -0.1, 0.7, 0.85

    animation = windowsIn, 1, 3, emphasizedDecel, popin 80%
    animation = fadeIn, 1, 3, emphasizedDecel
    animation = windowsOut, 1, 2, emphasizedDecel, popin 90%
    animation = fadeOut, 1, 2, emphasizedDecel
    animation = windowsMove, 1, 3, emphasizedDecel, slide
    animation = border, 1, 10, emphasizedDecel
    animation = layersIn, 0
    animation = layersOut, 0
    animation = fadeLayersIn, 0
    animation = fadeLayersOut, 0
    animation = workspaces, 0
    animation = specialWorkspaceIn, 0
    animation = specialWorkspaceOut, 0
    animation = zoomFactor, 1, 3, emphasizedDecel
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

#############
### INPUT ###
#############

input {
    kb_layout = de
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

# Allgemein
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod, F, fullscreen
bind = $mainMod, R, exec, ~/.local/bin/toggle-laptop-rotation.sh
bind = $mainMod, Y, exec, kitty yazi
bind = $mainMod, O, exec, ~/.config/hypr/scripts/toggle-opacity.sh

# Fokus & Workspaces
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Medien
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Noctalia Shell
bind = $mainMod SHIFT, Q, exec, ~/.config/hypr/scripts/switch-status-bar.sh menu
bind = $mainMod, X, exec, qs -c noctalia-shell ipc call sessionMenu toggle
bind = $mainMod, L, exec, ~/.local/share/quickshell-lockscreen/lock.sh
bind = $mainMod, T, exec, qs -c noctalia-shell ipc call darkMode toggle
bind = $mainMod, N, exec, qs -c noctalia-shell ipc call notifications toggleHistory
bind = $mainMod, C, exec, qs -c noctalia-shell ipc call controlCenter toggle
bind = $mainMod, S, exec, qs -c noctalia-shell ipc call settings toggle
bind = $mainMod, W, exec, qs -c noctalia-shell ipc call wallpaper toggle

bindel = , XF86AudioRaiseVolume, exec, qs -c noctalia-shell ipc call volume increase
bindel = , XF86AudioLowerVolume, exec, qs -c noctalia-shell ipc call volume decrease
bindel = , XF86AudioMute, exec, qs -c noctalia-shell ipc call volume muteOutput
bindel = , XF86AudioMicMute, exec, qs -c noctalia-shell ipc call volume muteInput
bindel = , XF86MonBrightnessUp, exec, qs -c noctalia-shell ipc call brightness increase
bindel = , XF86MonBrightnessDown, exec, qs -c noctalia-shell ipc call brightness decrease

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = match:class zen|org.mozilla.firefox|helium|Brave-browser|brave-browser|vivaldi-stable|Vivaldi-stable|vivaldi-snapshot|Vivaldi-snapshot, workspace 2
windowrule = match:class code|antigravity|cursor|codium, workspace 3

windowrule = suppress_event maximize, match:class .*
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

windowrule = float on, match:class ^(gnome-calculator)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org\.gnome\.Nautilus)$
windowrule = float on, match:class ^(org\.quickshell)$

layerrule = match:namespace ^(noctalia-overview.*)$, blur on

# Von Noctalia bei Theme-Wechsel automatisch geschrieben — nicht inline verschieben
source = ~/.config/hypr/noctalia/noctalia-colors.conf
