source = ~/.config/hypr/hyprlock/colors.conf
source = ~/.config/hypr/noctalia/noctalia-colors.conf

# Use Matugen font variable, keep a local alias.
$font = $font_family

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 2, linear
    animation = fadeOut, 1, 2, linear
    animation = inputFieldDots, 1, 1, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 1
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = $entry_background_color
    outer_color = $primary
    check_color = $secondary
    fail_color = $error
    font_color = $entry_color
    fade_on_empty = false
    rounding = 0

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = $secondary
    font_size = 80
    font_family = $font

    position = 0, 75
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = $primary
    font_size = 25
    font_family = $font

    position = 0, 0
    halign = right
    valign = top 
}

label {
    monitor =
    text = $LAYOUT[de]
    color = $tertiary
    font_size = 24
    onclick = hyprctl switchxkblayout all next

    position = 225, -20
    halign = center
    valign = center
}
